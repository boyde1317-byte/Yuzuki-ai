# ── Yuzuki AI — docker-compose for VPS deployment ────────────────────────────
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. docker compose logs -f    ← watch for the pairing code
#   4. Enter the code in WhatsApp (valid for ~60 s)
#   5. Bot is live. Session is persisted in named volumes.
#
# On pairing code expiry (connection drops before code is entered):
#   The bot reconnects automatically and requests a new code.
#   Check: docker compose logs -f yuzuki
# ─────────────────────────────────────────────────────────────────────────────

services:
  yuzuki:
    build: .
    image: yuzuki-ai:latest
    container_name: yuzuki-ai
    restart: unless-stopped

    # All config via env — never commit .env to git
    env_file: .env

    environment:
      # Override any .env value here if needed
      NODE_ENV: production
      # Use absolute paths inside the container for reliability
      DB_PATH:     /data/database.sqlite
      SESSION_DIR: /data/session
      LOGS_DIR:    /data/logs
      TEMP_DIR:    /tmp/yuzuki

    ports:
      # Health endpoint: http://<vps-ip>:${PORT}/health
      - "${PORT:-3000}:${PORT:-3000}"

    volumes:
      # Persistent data — session + database survive container restarts
      - yuzuki_data:/data

    # Startup ordering (uncomment if you add a DB service)
    # depends_on:
    #   - db

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health/summary"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  yuzuki_data:
    driver: local
